[package]
name         = "meta-signal-orchestrate"
version      = "0.3.0"
edition      = "2024"
rust-version = "1.89"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/meta-signal-orchestrate"
description  = "MetaSignal contract for privileged orchestrate role and repository administration."
publish      = false
links        = "meta-signal-orchestrate"
build        = "build.rs"

[lib]
name = "meta_signal_orchestrate"
path = "src/lib.rs"

[features]
default   = ["nota-text"]
nota-text = ["signal-orchestrate/nota-text", "signal-frame/nota-text"]

[dependencies]
signal-frame                = { git = "https://github.com/LiGoldragon/signal-frame.git", branch = "main", default-features = false }
signal-orchestrate = { git = "https://github.com/LiGoldragon/signal-orchestrate.git", branch = "main" }
nota-next                   = { git = "https://github.com/LiGoldragon/nota-next.git", branch = "main" }
rkyv                        = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
thiserror                   = "2"

[build-dependencies]
schema-rust-next = { git = "https://github.com/LiGoldragon/schema-rust-next.git", branch = "main" }

[dev-dependencies]
schema-next = { git = "https://github.com/LiGoldragon/schema-next.git", branch = "main" }

[lints.rust]
unsafe_code = "forbid"
unused      = { level = "warn", priority = -1 }
dead_code   = "warn"

# eh5a PROTOTYPE SCAFFOLD — remove once operator lands
# signal-orchestrate-worktree-registry on signal-orchestrate main. Redirects
# the signal-orchestrate git source to the local worktree-registry worktree so
# meta-signal-orchestrate can consume the not-yet-merged Worktree contract
# (designer branch signal-orchestrate-worktree-registry, tip e04d0d28). The
# orchestrate daemon mirrors this redirect so exactly one signal-orchestrate
# version resolves across the whole graph.
[patch."https://github.com/LiGoldragon/signal-orchestrate.git"]
signal-orchestrate = { path = "/home/li/wt/github.com/LiGoldragon/signal-orchestrate/worktree-registry" }
